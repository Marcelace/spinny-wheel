<!DOCTYPE html>
<html lang="en">
<head>
    <title>Wheel</title>
    <script src='/js/Winwheel.js'>
    </script>
    <script src='https://cdnjs.cloudflare.com/ajax/libs/gsap/2.1.3/TweenMax.min.js'>
    </script>
    <style>
        #canvasContainer {
            position: relative;
            width: 600px;
        }

        #canvas {
            z-index: 1;
        }

        #prizePointer {
            position: absolute;
            left: 100%;
            top: 50%;
            transform: translate(-25%, -50%);
            z-index: 999;
        }

    </style>
</head>
<body>

<h1>SPIN THE WHEEL!</h1>

<div id="canvasContainer">
    <canvas id="canvas" width="600" height="600">
        Canvas not supported, please user another browser.
    </canvas>
    <img id="prizePointer" src="/img/pointer.png" alt="V"/>
</div>

<script>
    const segments = {rules.raw};
    console.log(segments);
    console.log(segments[0]);

    const coloredSegments = segments.map((segment, i) => {
            const hue = (i * 360) / segments.length;
            return {
                ...segment,
                fillStyle: "hsl(" + hue + ", 70%, 60%)"
            };
        }
    )

    let theWheel = new Winwheel({
        'numSegments': coloredSegments.length,
        'segments': coloredSegments,
        'animation':                   // Note animation properties passed in constructor parameters.
            {
                'type': 'spinToStop',  // Type of animation.
                'duration': 5,             // How long the animation is to take in seconds.
                'spins': 8              // The number of complete 360 degree rotations the wheel is to do.
            }
    });
</script>

<button onClick="theWheel.startAnimation();">Spin the Wheel</button>
</body>
</html>
